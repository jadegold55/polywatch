services:
  postgres:
    image: postgres:16-alpine
    container_name: polywatch-postgres
    environment:
      POSTGRES_USER: polywatch
      POSTGRES_PASSWORD: polywatch_dev
      POSTGRES_DB: polywatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polywatch -d polywatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
